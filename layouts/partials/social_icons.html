<div class="social-icons" {{ with .align}}align="{{.}}" {{- end }}>
    {{- range site.Params.socialIcons }}
    {{- if eq .name "email" }}
    <a href="javascript:void(0)" onclick="decodeAndShowEmail('{{ .url }}')" rel="noopener noreferrer me"
        title="{{ (.title | default .name) | title }}">
        {{ partial "svg.html" . }}
    </a>
    {{- else }}
    <a href="{{ trim .url " " | safeURL }}" target="_blank" rel="noopener noreferrer me"
        title="{{ (.title | default .name) | title }}">
        {{ partial "svg.html" . }}
    </a>
    {{- end }}
    {{- end }}
</div>
<script>
function decodeAndShowEmail(encodedEmail) {
    var decodedEmail = atob(encodedEmail);
    alert(decodedEmail);
}
</script>
